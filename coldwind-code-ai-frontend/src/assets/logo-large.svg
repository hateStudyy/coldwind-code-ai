<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 龙宝宝身体 -->
  <ellipse cx="150" cy="190" rx="70" ry="45" fill="#ff6b6b" stroke="#e55555" stroke-width="3"/>
  
  <!-- 龙宝宝头部 -->
  <circle cx="150" cy="90" r="45" fill="#ff8e8e" stroke="#e55555" stroke-width="3"/>
  
  <!-- 龙宝宝眼睛 -->
  <circle cx="135" cy="82" r="8" fill="#333"/>
  <circle cx="165" cy="82" r="8" fill="#333"/>
  <circle cx="135.5" cy="81.5" r="3" fill="#fff"/>
  <circle cx="165.5" cy="81.5" r="3" fill="#fff"/>
  
  <!-- 龙宝宝鼻子 -->
  <ellipse cx="150" cy="93" rx="4" ry="3" fill="#e55555"/>
  
