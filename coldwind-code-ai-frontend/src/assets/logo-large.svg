  <text x="150" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff9f43">外卖</text>
  
  <!-- 代码元素装饰 -->
  <rect x="40" y="200" width="30" height="20" rx="3" fill="#fff" stroke="#ff9f43" stroke-width="2"/>
  <text x="55" y="213" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#ff9f43">&lt;/&gt;</text>
