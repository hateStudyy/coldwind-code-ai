  <circle cx="120" cy="225" r="8" fill="#ff8e8e"/>
  <circle cx="180" cy="225" r="8" fill="#ff8e8e"/>
  
  <!-- 可爱的小星星装饰 -->
  <path d="M 45 52 L 48 60 L 56 60 L 50 66 L 52 74 L 45 70 L 38 74 L 40 66 L 34 60 L 42 60 Z" fill="#ffd93d" opacity="0.8"/>
  <path d="M 255 75 L 258 82 L 266 82 L 260 88 L 262 96 L 255 92 L 248 96 L 250 88 L 244 82 L 252 82 Z" fill="#ffd93d" opacity="0.8"/>
  
