  <path d="M 142 100 Q 150 105 158 100" stroke="#e55555" stroke-width="4" fill="none"/>
  
  <!-- 龙宝宝角 -->
  <path d="M 127 67 L 120 45 L 127 60" stroke="#ff9f43" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 173 67 L 180 45 L 173 60" stroke="#ff9f43" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- 龙宝宝翅膀 -->
  <ellipse cx="105" cy="165" rx="22" ry="30" fill="#ff9f43" opacity="0.8" transform="rotate(-20 105 165)"/>
  <ellipse cx="195" cy="165" rx="22" ry="30" fill="#ff9f43" opacity="0.8" transform="rotate(20 195 165)"/>
  
  <!-- 龙宝宝尾巴 -->
  <path d="M 80 190 Q 50 210 35 240 Q 20 270 50 285" stroke="#ff6b6b" stroke-width="9" fill="none" stroke-linecap="round"/>
  
