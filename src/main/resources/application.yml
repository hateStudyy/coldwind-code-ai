spring:
  application:
    name: coldwind-code-ai
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/coldwind_code_ai
    username: root
    password: 12345678
server:
  port: 8999
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: in.yumi.coldwindcodeai.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
